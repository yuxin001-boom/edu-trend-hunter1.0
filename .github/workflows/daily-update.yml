                  if t2 not in ss:ss.add(t2);so360_items.append({'title':t2,'url':'https://www.so.com/s?q='+quote(t2),'heat':i.get('heat',0)})
              all_data={'weibo':weibo_items,'baidu':baidu_items,'douyin':douyin_items,'quark':quark_items,'so360':so360_items}
              pnames={'weibo':'微博','baidu':'百度','douyin':'抖音','quark':'夸克','so360':'360'}
              hot_search={}
              for p,items in all_data.items():
                  edu=[i for i in items if is_edu(i['title'])]
                  edu.sort(key=lambda x:int(x.get('heat',0)or 0),reverse=True)
