name: "\U0001F4DA 每日自动更新教育热点数据"
on:
  schedule:
    - cron: '0 1,3,5 * * *'
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4E5 检出代码"
        uses: actions/checkout@v4
      - name: "\U0001F40D 安装 Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "\U0001F4E1 运行数据采集"
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json,os,time,random,sys,traceback
          from datetime import datetime
          from urllib.request import urlopen,Request
          from urllib.parse import quote

          try:
              EDU_KW=['考研','高考','中考','公务员','考公','国考','省考','教师资格','四六级','雅思','托福','MBA','考博','保研','调剂','分数线','志愿填报','录取','招生','毕业','论文','考试','考证','教育','学校','老师','教师','学生','家长','学霸','课程','教育部','双减','学费','大学','高校','留学','幼儿园','小学','初中','高中','幼小衔接','学区房','兴趣班','补习','辅导','培训班','托管','研学','少儿编程','奥数','暑假','寒假','开学','自考','成考','专升本','学历','在职','职业培训','一建','二建','注会','法考','网课','在线教育','学习机','词典笔','点读笔','学习平板','AI教育','教材','教辅','课本','书单','绘本']
              def ua():return'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126.0.0.0 Safari/537.36'
              def get_json(url,ref=''):
                  try:
                      h={'User-Agent':ua(),'Accept':'application/json'}
                      if ref:h['Referer']=ref
                      with urlopen(Request(url,headers=h),timeout=20) as r:return json.loads(r.read().decode('utf-8',errors='ignore'))
                  except:return None
              def is_edu(t):return any(k in t for k in EDU_KW)
              def categorize(t):
                  if any(k in t for k in['考研','公务员','考公','国考','MBA','自考','成考','专升本','学历','在职','一建','二建','注会','法考','职业培训','留学','考博']):return'成人教育'
