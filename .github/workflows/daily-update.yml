                      if isinstance(e, urllib.error.HTTPError):
                          err_body=e.read().decode('utf-8','ignore')[:300]
                          print("  飞书异常: "+str(e)+" 响应:"+err_body)
                      else:
                          print("  飞书异常: "+str(e))
              else:
                  print("  飞书: 未配置LARK凭证,读取旧数据")
                  try:
                      with open('data.json','r',encoding='utf-8') as f:
                          douyin_hotspot=json.load(f).get('douyin_hotspot',[])
                  except:
                      pass
              print("  飞书热点结果: "+str(len(douyin_hotspot))+"条")
              now=datetime.now()
              output={"update_time":now.strftime('%Y-%m-%d %H:%M'),"issue_no":(now-datetime(2026,6,12)).days+1,"hot_search":hot_search,"hot_products":hot_products,"top15_today":top15,"marketing_suggestions":marketing,"user_hotsearch":user_hs,"douyin_hotspot":douyin_hotspot}
              with open('data.json','w',encoding='utf-8') as f:
                  json.dump(output,f,ensure_ascii=False,indent=2)
              print("完成! 热搜"+str(sum(len(v) for v in hot_search.values()))+"|商品30|TOP15 "+str(len(top15))+"|画像"+str(sum(len(v) for v in user_hs.values())))
          except Exception as e:
              print("FATAL ERROR: "+str(e))
              traceback.print_exc()
          sys.exit(0)
          PYTHON_SCRIPT
