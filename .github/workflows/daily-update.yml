              for i in all_u:
                  if i['title']in seen2:continue
                  seen2.add(i['title']);t2=i['title']
                  if any(k in t2 for k in['孩子','家长','暑假','高考','中考','亲子','儿童','幼儿','学校','小学']):panel='k12'
                  elif any(k in t2 for k in['考公','面试','薪资','裁员','基金','股市','金融','创业','就业']):panel='adult_edu'
                  elif any(k in t2 for k in['AI','科技','手机','数码','芯片','智能','互联网','电子']):panel='e_edu'
                  elif any(k in t2 for k in['书单','小说','文化','电影','综艺','明星','歌手','阅读']):panel='books'
                  else:
                      counts={k:len(v)for k,v in user_hs.items()};panel=min(counts,key=counts.get)
                  if len(user_hs[panel])<15:user_hs[panel].append({'rank':len(user_hs[panel])+1,'title':t2,'heat':i['heat'],'heat_raw':i.get('heat_raw',0),'platform':i['platform'],'url':i.get('url','')})
