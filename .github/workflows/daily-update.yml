              time.sleep(0.3)
              toutiao_items=[]
              tt=get_json('https://www.toutiao.com/hot-event/hot-board/?origin=toutiao_pc','https://www.toutiao.com/')
              if tt:
                  for i in tt.get('data',[]):
                      t2=i.get('Title','').strip()
